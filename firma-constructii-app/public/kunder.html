<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construct Pro - Kunder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
        }

        .input-field {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 100%;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        .customer-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .customer-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b px-4 py-2 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-slate-400 hover:text-orange-600 p-2"><i class="fas fa-arrow-left"></i></a>
            <div id="navLogo">
                <div class="bg-orange-600 text-white p-2 rounded-lg"><i class="fas fa-hammer"></i></div>
            </div>
            <div>
                <h1 id="navCompName" class="font-bold text-sm">CONSTRUCT PRO</h1>
                <p class="text-[10px] text-slate-500" data-i18n="customer_management">Kundhantering</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="openAddModal()"
                class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-orange-600">
                <i class="fas fa-plus mr-1"></i><span data-i18n="new_customer">Ny Kund</span>
            </button>
        </div>
    </nav>

    <!-- Stats -->
    <div class="max-w-6xl mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-4 rounded-xl">
                <p class="text-blue-100 text-xs" data-i18n="total_customers">Totalt kunder</p>
                <p id="statTotal" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-4 rounded-xl">
                <p class="text-green-100 text-xs" data-i18n="active_projects">Aktiva projekt</p>
                <p id="statActive" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-4 rounded-xl">
                <p class="text-purple-100 text-xs" data-i18n="new_this_month">Nya denna månad</p>
                <p id="statNew" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-4 rounded-xl">
                <p class="text-orange-100 text-xs" data-i18n="quotes_sent">Offerter skickade</p>
                <p id="statOffers" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <!-- Search -->
        <div class="flex gap-3 mb-6">
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Sök kund..." class="input-field pl-10"
                    oninput="filterCustomers()">
            </div>
            <select id="filterStatus" class="input-field w-40" onchange="filterCustomers()">
                <option value="">Alla</option>
                <option value="active">Aktiv</option>
                <option value="completed">Avslutad</option>
            </select>
        </div>

        <!-- Customer List -->
        <div id="customerList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Cards rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <i class="fas fa-users text-6xl text-slate-300 mb-4"></i>
            <h3 class="text-xl font-bold text-slate-600 mb-2" data-i18n="no_customers">Inga kunder ännu</h3>
            <p class="text-slate-400 mb-4" data-i18n="add_first_customer">Lägg till din första kund eller spara en
                offert</p>
            <button onclick="openAddModal()" class="bg-orange-500 text-white px-6 py-3 rounded-lg font-bold">
                <i class="fas fa-plus mr-2"></i><span data-i18n="add_customer">Lägg till kund</span>
            </button>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="customerModal" class="modal">
        <div class="bg-white rounded-xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl">
            <div
                class="bg-gradient-to-r from-orange-500 to-orange-600 text-white p-4 flex justify-between items-center">
                <h2 id="modalTitle" class="font-bold text-lg"><i class="fas fa-user-plus mr-2"></i>Ny Kund</h2>
                <button onclick="closeModal()" class="text-xl hover:opacity-70"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="custId">
                <div>
                    <label class="text-sm text-slate-600 font-medium">Namn *</label>
                    <input type="text" id="custName" class="input-field" placeholder="Förnamn Efternamn">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-sm text-slate-600 font-medium">Telefon</label>
                        <input type="tel" id="custPhone" class="input-field" placeholder="+46 70 123 4567">
                    </div>
                    <div>
                        <label class="text-sm text-slate-600 font-medium">E-post</label>
                        <input type="email" id="custEmail" class="input-field" placeholder="email@example.com">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-slate-600 font-medium">Adress</label>
                    <input type="text" id="custAddress" class="input-field" placeholder="Gatuadress 123">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-sm text-slate-600 font-medium">Postnummer</label>
                        <input type="text" id="custZip" class="input-field" placeholder="123 45">
                    </div>
                    <div>
                        <label class="text-sm text-slate-600 font-medium">Stad</label>
                        <input type="text" id="custCity" class="input-field" placeholder="Stockholm">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-slate-600 font-medium">Anteckningar</label>
                    <textarea id="custNotes" class="input-field" rows="2"
                        placeholder="Övriga anteckningar..."></textarea>
                </div>
            </div>
            <div class="border-t p-4 flex gap-3 justify-end bg-slate-50">
                <button onclick="closeModal()"
                    class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-medium">Avbryt</button>
                <button onclick="saveCustomer()"
                    class="px-6 py-2 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600">
                    <i class="fas fa-save mr-1"></i>Spara
                </button>
            </div>
        </div>
    </div>

    <!-- Customer Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="bg-white rounded-xl w-full max-w-2xl mx-4 overflow-hidden shadow-2xl max-h-[90vh] overflow-y-auto">
            <div
                class="bg-gradient-to-r from-slate-700 to-slate-800 text-white p-4 flex justify-between items-center sticky top-0">
                <h2 id="detailTitle" class="font-bold text-lg"><i class="fas fa-user mr-2"></i>Kunddetaljer</h2>
                <button onclick="closeDetailModal()" class="text-xl hover:opacity-70"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="detailContent" class="p-6">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
        let customers = [];
        let currentLang = localStorage.getItem('constructPro_lang') || 'sv';

        const translations = {
            sv: {
                customer_management: 'Kundhantering', new_customer: 'Ny Kund', total_customers: 'Totalt kunder',
                active_projects: 'Aktiva projekt', new_this_month: 'Nya denna månad', quotes_sent: 'Offerter skickade',
                search_customer: 'Sök kund...', all: 'Alla', active: 'Aktiv', completed: 'Avslutad',
                no_customers: 'Inga kunder ännu', add_first_customer: 'Lägg till din första kund eller spara en offert',
                add_customer: 'Lägg till kund', name: 'Namn', phone: 'Telefon', email: 'E-post', address: 'Adress',
                zip: 'Postnummer', city: 'Stad', notes: 'Anteckningar', other_notes: 'Övriga anteckningar...',
                cancel: 'Avbryt', save: 'Spara', edit_customer: 'Redigera Kund', customer_details: 'Kunddetaljer',
                contact_info: 'Kontaktinfo', statistics: 'Statistik', customer_since: 'Kund sedan',
                num_quotes: 'Antal offerter', status: 'Status', quote_history: 'Offerthistorik',
                no_quotes: 'Inga offerter ännu', print_report: 'Skriv ut rapport',
                delete_confirm: 'Ta bort denna kund?', name_required: 'Namn krävs', no_city: 'Ingen stad',
                created: 'Skapad'
            },
            en: {
                customer_management: 'Customer Management', new_customer: 'New Customer', total_customers: 'Total customers',
                active_projects: 'Active projects', new_this_month: 'New this month', quotes_sent: 'Quotes sent',
                search_customer: 'Search customer...', all: 'All', active: 'Active', completed: 'Completed',
                no_customers: 'No customers yet', add_first_customer: 'Add your first customer or save a quote',
                add_customer: 'Add customer', name: 'Name', phone: 'Phone', email: 'Email', address: 'Address',
                zip: 'Zip code', city: 'City', notes: 'Notes', other_notes: 'Other notes...',
                cancel: 'Cancel', save: 'Save', edit_customer: 'Edit Customer', customer_details: 'Customer Details',
                contact_info: 'Contact info', statistics: 'Statistics', customer_since: 'Customer since',
                num_quotes: 'Number of quotes', status: 'Status', quote_history: 'Quote history',
                no_quotes: 'No quotes yet', print_report: 'Print report',
                delete_confirm: 'Delete this customer?', name_required: 'Name required', no_city: 'No city',
                created: 'Created'
            },
            ro: {
                customer_management: 'Gestionare Clienți', new_customer: 'Client Nou', total_customers: 'Total clienți',
                active_projects: 'Proiecte active', new_this_month: 'Noi luna aceasta', quotes_sent: 'Oferte trimise',
                search_customer: 'Caută client...', all: 'Toate', active: 'Activ', completed: 'Finalizat',
                no_customers: 'Niciun client încă', add_first_customer: 'Adaugă primul client sau salvează o ofertă',
                add_customer: 'Adaugă client', name: 'Nume', phone: 'Telefon', email: 'Email', address: 'Adresă',
                zip: 'Cod poștal', city: 'Oraș', notes: 'Note', other_notes: 'Alte note...',
                cancel: 'Anulează', save: 'Salvează', edit_customer: 'Editează Client', customer_details: 'Detalii Client',
                contact_info: 'Info contact', statistics: 'Statistici', customer_since: 'Client din',
                num_quotes: 'Număr oferte', status: 'Status', quote_history: 'Istoric oferte',
                no_quotes: 'Nicio ofertă încă', print_report: 'Tipărește raport',
                delete_confirm: 'Ștergi acest client?', name_required: 'Numele e obligatoriu', no_city: 'Fără oraș',
                created: 'Creat'
            }
        };
        const t = translations[currentLang] || translations.sv;

        function loadCustomers() {
            try {
                customers = JSON.parse(localStorage.getItem('constructPro_customers') || '[]');
            } catch (e) { customers = []; }

            // Load company
            try {
                const settings = JSON.parse(localStorage.getItem('constructPro_settings') || '{}');
                if (settings.company?.name) document.getElementById('navCompName').innerText = settings.company.name;
                if (settings.company?.logo) document.getElementById('navLogo').innerHTML = `<img src="${settings.company.logo}" class="h-10 object-contain">`;
            } catch (e) { }

            applyTranslations();
            renderCustomers();
            updateStats();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
        }

        function renderCustomers() {
            const list = document.getElementById('customerList');
            const empty = document.getElementById('emptyState');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;

            let filtered = customers.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search) ||
                    (c.email || '').toLowerCase().includes(search) ||
                    (c.phone || '').includes(search);
                const matchStatus = !filter || c.status === filter;
                return matchSearch && matchStatus;
            });

            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = filtered.map(c => `
                <div class="customer-card p-4 cursor-pointer" onclick="showDetail('${c.id}')">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-gradient-to-br from-orange-400 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                ${c.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800">${c.name}</h3>
                                <p class="text-xs text-slate-400">${c.city || 'Ingen stad'}</p>
                            </div>
                        </div>
                        <span class="badge ${c.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-600'}">
                            ${c.status === 'active' ? 'Aktiv' : 'Avslutad'}
                        </span>
                    </div>
                    <div class="space-y-1 text-sm text-slate-600">
                        ${c.phone ? `<p><i class="fas fa-phone text-slate-400 w-5"></i>${c.phone}</p>` : ''}
                        ${c.email ? `<p><i class="fas fa-envelope text-slate-400 w-5"></i>${c.email}</p>` : ''}
                        ${c.address ? `<p><i class="fas fa-map-marker-alt text-slate-400 w-5"></i>${c.address}</p>` : ''}
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t">
                        <span class="text-xs text-slate-400">
                            <i class="fas fa-calendar mr-1"></i>Skapad ${new Date(c.createdAt).toLocaleDateString('sv-SE')}
                        </span>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); editCustomer('${c.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                            <button onclick="event.stopPropagation(); deleteCustomer('${c.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCustomers() { renderCustomers(); }

        function updateStats() {
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            document.getElementById('statTotal').innerText = customers.length;
            document.getElementById('statActive').innerText = customers.filter(c => c.status === 'active').length;
            document.getElementById('statNew').innerText = customers.filter(c => new Date(c.createdAt) >= monthStart).length;
            document.getElementById('statOffers').innerText = customers.reduce((sum, c) => sum + (c.offers?.length || 0), 0);
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus mr-2"></i>Ny Kund';
            document.getElementById('custId').value = '';
            document.getElementById('custName').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('custEmail').value = '';
            document.getElementById('custAddress').value = '';
            document.getElementById('custZip').value = '';
            document.getElementById('custCity').value = '';
            document.getElementById('custNotes').value = '';
            document.getElementById('customerModal').classList.add('active');
        }

        function editCustomer(id) {
            const c = customers.find(x => x.id === id);
            if (!c) return;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit mr-2"></i>Redigera Kund';
            document.getElementById('custId').value = c.id;
            document.getElementById('custName').value = c.name;
            document.getElementById('custPhone').value = c.phone || '';
            document.getElementById('custEmail').value = c.email || '';
            document.getElementById('custAddress').value = c.address || '';
            document.getElementById('custZip').value = c.zip || '';
            document.getElementById('custCity').value = c.city || '';
            document.getElementById('custNotes').value = c.notes || '';
            document.getElementById('customerModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('customerModal').classList.remove('active');
        }

        function saveCustomer() {
            const id = document.getElementById('custId').value;
            const data = {
                id: id || 'cust_' + Date.now(),
                name: document.getElementById('custName').value.trim(),
                phone: document.getElementById('custPhone').value.trim(),
                email: document.getElementById('custEmail').value.trim(),
                address: document.getElementById('custAddress').value.trim(),
                zip: document.getElementById('custZip').value.trim(),
                city: document.getElementById('custCity').value.trim(),
                notes: document.getElementById('custNotes').value.trim(),
                status: 'active',
                createdAt: id ? customers.find(c => c.id === id)?.createdAt : new Date().toISOString(),
                offers: id ? customers.find(c => c.id === id)?.offers || [] : []
            };

            if (!data.name) { alert('Namn krävs'); return; }

            if (id) {
                const idx = customers.findIndex(c => c.id === id);
                if (idx >= 0) customers[idx] = data;
            } else {
                customers.push(data);
            }

            localStorage.setItem('constructPro_customers', JSON.stringify(customers));
            closeModal();
            renderCustomers();
            updateStats();
        }

        function deleteCustomer(id) {
            if (!confirm('Ta bort denna kund?')) return;
            customers = customers.filter(c => c.id !== id);
            localStorage.setItem('constructPro_customers', JSON.stringify(customers));
            renderCustomers();
            updateStats();
        }

        function showDetail(id) {
            const c = customers.find(x => x.id === id);
            if (!c) return;

            document.getElementById('detailTitle').innerHTML = `<i class="fas fa-user mr-2"></i>${c.name}`;
            document.getElementById('detailContent').innerHTML = `
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-bold text-slate-700 mb-3"><i class="fas fa-info-circle text-orange-500 mr-2"></i>Kontaktinfo</h3>
                        <div class="space-y-2 text-sm">
                            <p><span class="text-slate-400">Telefon:</span> ${c.phone || '-'}</p>
                            <p><span class="text-slate-400">E-post:</span> ${c.email || '-'}</p>
                            <p><span class="text-slate-400">Adress:</span> ${c.address || '-'}</p>
                            <p><span class="text-slate-400">Postnr/Stad:</span> ${c.zip || ''} ${c.city || '-'}</p>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-700 mb-3"><i class="fas fa-chart-line text-green-500 mr-2"></i>Statistik</h3>
                        <div class="space-y-2 text-sm">
                            <p><span class="text-slate-400">Kund sedan:</span> ${new Date(c.createdAt).toLocaleDateString('sv-SE')}</p>
                            <p><span class="text-slate-400">Antal offerter:</span> ${c.offers?.length || 0}</p>
                            <p><span class="text-slate-400">Status:</span> <span class="badge ${c.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-600'}">${c.status === 'active' ? 'Aktiv' : 'Avslutad'}</span></p>
                        </div>
                    </div>
                </div>
                ${c.notes ? `<div class="mt-6 p-4 bg-slate-50 rounded-lg"><h3 class="font-bold text-slate-700 mb-2"><i class="fas fa-sticky-note text-yellow-500 mr-2"></i>Anteckningar</h3><p class="text-sm text-slate-600">${c.notes}</p></div>` : ''}
                <div class="mt-6">
                    <h3 class="font-bold text-slate-700 mb-3"><i class="fas fa-file-invoice text-blue-500 mr-2"></i>Offerthistorik</h3>
                    ${(c.offers?.length > 0) ? c.offers.map(o => `
                        <div class="p-3 border rounded-lg mb-2 flex justify-between items-center">
                            <div>
                                <p class="font-medium">${o.type || 'Offert'}</p>
                                <p class="text-xs text-slate-400">${o.date}</p>
                            </div>
                            <span class="font-bold text-green-600">${o.total || 0} SEK</span>
                        </div>
                    `).join('') : '<p class="text-slate-400 text-sm">Inga offerter ännu</p>'}
                </div>
                <div class="mt-4 pt-4 border-t flex justify-end">
                     <button onclick="window.print()" class="flex items-center gap-2 text-slate-600 hover:text-slate-800 font-medium">
                        <i class="fas fa-print"></i> Skriv ut rapport
                    </button>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // Init
        loadCustomers();
    </script>
</body>

</html>
